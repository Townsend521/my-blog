<script async defer src="https://buttons.github.io/buttons.js"></script>
<style>
  .hb-hide-blog-hero .article-cover,
  .hb-hide-blog-hero .featured-image-wrapper {
    display: none !important;
  }
</style>
<script>
  (function () {
    var p = window.location.pathname || "";
    if (/\/blog\/[^/]+\/?$/.test(p)) {
      document.documentElement.classList.add("hb-hide-blog-hero");
    }
  })();
</script>
<script>
  (function () {
    document.addEventListener("click", function (e) {
      var trigger = e.target.closest(".nav-item.nav-dropdown > span.nav-link");
      if (!trigger) return;
      if ((trigger.textContent || "").indexOf("博客") === -1) return;

      var home = document.querySelector("a.navbar-brand");
      var base = (home && home.getAttribute("href")) || "/";
      base = base.endsWith("/") ? base : base + "/";

      window.location.href = base + "blog/";
    });
  })();
</script>
<script>
  (function () {
    function updateCardReadingTimes() {
      var cards = document.querySelectorAll('[role="article"][aria-labelledby^="card-title-"]');
      cards.forEach(function (card) {
        var link = card.querySelector('a[href*="/blog/"]');
        var stat = Array.from(card.querySelectorAll("span")).find(function (el) {
          return /分钟阅读时长/.test(el.textContent || "");
        });
        if (!link || !stat) return;

        fetch(link.href, { credentials: "same-origin" })
          .then(function (res) { return res.ok ? res.text() : ""; })
          .then(function (html) {
            if (!html) return;
            var match = html.match(/(\d+)\s*分钟阅读时长/);
            if (match) stat.textContent = match[1] + " 分钟阅读时长";
          })
          .catch(function () {});
      });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", updateCardReadingTimes);
    } else {
      updateCardReadingTimes();
    }
  })();
</script>
