baseURL = "https://townsend521.github.io/my-blog/"
title = "Townsend 博士知识库"
theme = "PaperMod"
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"
enableRobotsTXT = true
enableEmoji = true

[params]
  description = "博士生个人知识库：研究笔记、论文解读与方法沉淀。"
  author = "Townsend"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowBreadCrumbs = true
  ShowToc = true
  TocOpen = false
  mainSections = ["notes", "posts"]

  [params.homeInfoParams]
    Title = "博士生个人知识库"
    Content = "沉淀论文理解、方法框架、实验复盘和写作经验。"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/Townsend521"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "首页"
    url = "/"
    weight = 10
  [[menu.main]]
    identifier = "notes"
    name = "研究笔记"
    url = "/notes/"
    weight = 20
  [[menu.main]]
    identifier = "posts"
    name = "博客"
    url = "/posts/"
    weight = 30
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 40

[taxonomies]
  tag = "tags"
  category = "categories"
