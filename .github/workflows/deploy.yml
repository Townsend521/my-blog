name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure site URL and base path
        shell: bash
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO="${GITHUB_REPOSITORY#*/}"
          SITE="https://${OWNER}.github.io"

          if [ "$REPO" = "${OWNER}.github.io" ]; then
            BASE_PATH="/"
          else
            BASE_PATH="/${REPO}"
          fi

          echo "SITE=${SITE}" >> "$GITHUB_ENV"
          echo "BASE_PATH=${BASE_PATH}" >> "$GITHUB_ENV"
          echo "SITE=${SITE}, BASE_PATH=${BASE_PATH}"

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
